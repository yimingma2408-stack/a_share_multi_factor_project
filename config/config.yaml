project:
  name: a_share_multi_factor_project
  universe: hs300
  start_date: "2016-01-01"
  end_date: "2025-12-31"

paths:
  clean_daily_csv: data/processed/clean_daily_data.csv
  dynamic_panel_parquet: data/processed/hs300_dynamic_panel_20160101_20251231_baostock.parquet
  member_panel_parquet: data/processed/hs300_member_sample_20160101_20251231_baostock.parquet
  fundamental_panel_path: data/processed/fundamental_panel_akshare_with_market_cap.parquet
  market_cap_panel_path: data/processed/market_cap_panel.parquet
  reports_dir: reports
  audit_dir: reports/completion_audit

backtest:
  rebalance: monthly
  top_fraction: 0.20
  min_listing_days: 120
  one_way_cost_bps: [0, 5, 10, 20, 30, 50]

eot_map_lifecycle_test:
  base_window_weeks: 156
  recent_window_weeks: 26
  n_reference: 100
  epsilon_scale: 0.2
  alpha: 0.05
  fdr_level: 0.10
  bootstrap_final: 300
  bootstrap_methods: [iid_multiplier, block_multiplier]
  block_length_weeks: 8
  map_difference_direction: recent_minus_base
  random_seed: 42

factors:
  price_volume:
    momentum_windows: [20, 60, 120, 250]
    momentum_skip_days: 20
    volatility_windows: [20, 60, 120, 250]
    turnover_windows: [20, 60]
  value:
    required_columns:
      - market_cap
      - book_equity
      - net_profit
      - revenue
      - operating_cash_flow
      - announcement_date
  preprocessing:
    winsorize_quantiles: [0.01, 0.99]
    neutralize:
      industry: true
      log_size: true
